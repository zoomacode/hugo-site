baseURL: 'https://chaotic.land/'
languageCode: en-us
defaultContentLanguage: en
title: Chaotic Thoughts
theme: PaperMod
copyright: Anton Golubtsov
description: A collection of random thoughts on random topics from software engineering to mushrooms
googleAnalytics: G-96GHV7J9Q8
favicon: favicon.png
enableEmoji: true

taxonomies:
  tag: tags

languages:
